<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ZIVO IT | Launch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: Manrope, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            overflow-x: hidden;
            height: 100vh;
            align-items: center;
            justify-content: center;
            display: flex;
        }

        body:before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(6, 182, 212, .05) 1px, transparent 1px), linear-gradient(90deg, rgba(6, 182, 212, .05) 1px, transparent 1px);
            background-size: 42px 42px;
            z-index: -3
        }

        .glow,
        .glow2 {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: .35;
            animation: f 10s ease-in-out infinite
        }

        .glow {
            width: 420px;
            height: 420px;
            background: #22d3ee;
            left: -120px;
            top: -120px
        }

        .glow2 {
            width: 360px;
            height: 360px;
            background: #14b8a6;
            right: -100px;
            bottom: -100px;
            animation-delay: -5s
        }

        @keyframes f {
            50% {
                transform: translate(30px, -25px)
            }
        }

        .wrap {
            height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px
        }

        .card {
            width: min(920px, 100%);
            background: rgba(255, 255, 255, .75);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, .8);
            border-radius: 28px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(15, 23, 42, .08)
        }

        .logo {
            width: 130px;
            height: 90px;
            margin: auto;
            background: url('image.png') center/contain no-repeat
        }

        h2 {
            font-size: 2rem;
            margin: 12px 0 4px
        }

        .sub {
            color: #0891b2;
            font-weight: 700
        }

        .head {
            font-size: clamp(2rem, 4.5vw, 3rem);
            margin: 10px 0
        }

        .desc {
            max-width: 650px;
            margin: auto;
            color: #475569;
            line-height: 1.7
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin: 36px 0
        }

        .box {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            padding: 20px
        }

        .num {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            color: #0891b2
        }

        .lab {
            margin-top: 6px;
            color: #64748b
        }

        .badge {
            display: inline-block;
            padding: 14px 24px;
            border-radius: 999px;
            background: linear-gradient(135deg, #06b6d4, #14b8a6);
            color: #fff;
            font-weight: 700
        }

        .footer {
            margin-top: 22px;
            color: #64748b
        }

        @media(max-width:768px) {
            .wrap {
                align-items: flex-start;
                padding: 24px 16px
            }

            .card {
                padding: 28px 18px
            }

            .grid {
                grid-template-columns: repeat(2, 1fr)
            }

            .head {
                font-size: 2rem
            }
        }

        @media(max-width:420px) {
            .grid {
                gap: 10px
            }

            .box {
                padding: 14px
            }

            .badge {
                display: block;
                width: 100%;
                font-size: .9rem
            }
        }
    </style>
</head>

<body>
    <div class="glow"></div>
    <div class="glow2"></div>
    <div class="wrap">
        <div class="card">
            <div class="logo"></div>
            <h2>ZIVO IT</h2>
            <div class="sub">Certified Odoo Official Partner</div>
            <div class="head">
                Website Launch Countdown
            </div>
            <div class="grid">
                <div class="box">
                    <div id="d" class="num">00</div>
                    <div class="lab">Days</div>
                </div>
                <div class="box">
                    <div id="h" class="num">00</div>
                    <div class="lab">Hours</div>
                </div>
                <div class="box">
                    <div id="m" class="num">00</div>
                    <div class="lab">Minutes</div>
                </div>
                <div class="box">
                    <div id="s" class="num">00</div>
                    <div class="lab">Seconds</div>
                </div>
            </div>
            <div class="badge">🚀 Launching • 09 July 2026 • 08:30 AM IST</div>
            <div class="footer">© 2026 ZIVO IT. All Rights Reserved.</div>
        </div>
    </div>
    <script>
        const target = new Date("2026-07-09T08:30:00+05:30");
        function tick() {
            const diff = target - new Date(); if (diff <= 0) { location.replace("/"); return; }
            const vals = [Math.floor(diff / 864e5), Math.floor(diff % 864e5 / 36e5), Math.floor(diff % 36e5 / 6e4), Math.floor(diff % 6e4 / 1e3)];
            ["d", "h", "m", "s"].forEach((id, i) => document.getElementById(id).textContent = String(vals[i]).padStart(2, "0"));
        }
        tick(); setInterval(tick, 1000);
    </script>
</body>

</html>
